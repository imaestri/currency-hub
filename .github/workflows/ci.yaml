name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: 22

    env:
      CI: true
      VITE_FRANKFURTER_API_BASE_URL: https://api.frankfurter.dev/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  github-pages-build:
    name: GitHub Pages Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      CI: true
      VITE_FRANKFURTER_API_BASE_URL: https://api.frankfurter.dev/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build production assets
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  github-pages-deploy:
    name: GitHub Pages Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: github-pages-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
